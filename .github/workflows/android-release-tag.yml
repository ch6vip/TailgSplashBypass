name: Android Release (Tag Auto)

on:
  push:
    tags:
      - "[0-9]*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Validate Tag Against Module Version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version_code="$(sed -nE 's/^[[:space:]]*def moduleVersionCode = ([0-9]+)[[:space:]]*$/\1/p' app/build.gradle | head -n1)"
          version_name="$(sed -nE 's/^[[:space:]]*def moduleVersionName = \"([^\"]+)\"[[:space:]]*$/\1/p' app/build.gradle | head -n1)"

          if [[ -z "$version_code" || -z "$version_name" ]]; then
            echo "Failed to parse moduleVersionCode/moduleVersionName from app/build.gradle"
            exit 1
          fi

          expected_tag="${version_code}-${version_name}"
          if [[ "$TAG_NAME" != "$expected_tag" ]]; then
            echo "Tag mismatch: expected '$expected_tag', got '$TAG_NAME'"
            exit 1
          fi

      - name: Validate Signing Secrets
        shell: bash
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          missing=0
          for key in SIGNING_KEYSTORE_BASE64 SIGNING_STORE_PASSWORD SIGNING_KEY_ALIAS SIGNING_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode Keystore
        shell: bash
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > signing.keystore

      - name: Build Signed Release APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailg-lsposed-release-tag
          path: app/build/outputs/apk/release/*.apk

      - name: Create or Update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No release APK generated."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${apks[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${apks[@]}" --title "$TAG_NAME" --generate-notes
          fi
