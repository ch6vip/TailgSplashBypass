name: Android Release (Signed)

on:
  workflow_dispatch:

jobs:
  signed-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode Keystore
        shell: bash
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "Missing required secret: SIGNING_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > signing.keystore

      - name: Build Signed Release APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: tailg-lsposed-release-signed
          path: app/build/outputs/apk/release/*.apk
